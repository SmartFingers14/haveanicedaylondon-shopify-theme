name: Deploy to Shopify

on:
  push:
    branches:
      - main
      - v2-full-redesign

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Theme to Shopify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Shopify via API
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID }}
        run: |
          echo "Deploying theme files to Shopify store: $SHOPIFY_STORE"
          
          # Function to upload a file
          upload_file() {
            local file_path="$1"
            local asset_key="$2"
            local content
            content=$(cat "$file_path")
            
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PUT \
              -H "X-Shopify-Access-Token: $SHOPIFY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"asset\":{\"key\":\"$asset_key\",\"value\":$(echo "$content" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}}" \
              "https://$SHOPIFY_STORE/admin/api/2024-10/themes/$SHOPIFY_THEME_ID/assets.json")
            
            if [ "$response" = "200" ]; then
              echo "  ✓ $asset_key"
            else
              echo "  ✗ $asset_key (HTTP $response)"
            fi
          }
          
          # Upload all theme files
          echo "--- Uploading sections ---"
          for f in sections/*.liquid sections/*.json; do
            [ -f "$f" ] && upload_file "$f" "$f"
          done
          
          echo "--- Uploading layout ---"
          for f in layout/*.liquid; do
            [ -f "$f" ] && upload_file "$f" "$f"
          done
          
          echo "--- Uploading templates ---"
          for f in templates/*.json templates/*.liquid templates/customers/*.liquid; do
            [ -f "$f" ] && upload_file "$f" "$f"
          done
          
          echo "--- Uploading assets ---"
          for f in assets/*.css assets/*.js; do
            [ -f "$f" ] && upload_file "$f" "$f"
          done
          
          echo "--- Uploading config ---"
          for f in config/*.json; do
            [ -f "$f" ] && upload_file "$f" "$f"
          done
          
          echo "--- Uploading locales ---"
          for f in locales/*.json; do
            [ -f "$f" ] && upload_file "$f" "$f"
          done
          
          echo "--- Uploading snippets ---"
          for f in snippets/*.liquid; do
            [ -f "$f" ] && upload_file "$f" "$f"
          done
          
          echo "Deployment complete!"
